<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>休憩促進アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="connection-error" class="connection-error hidden">
    サーバーに接続できません
  </div>
  <div id="danger-warning" class="danger-warning hidden">
    ⚠ 連続作業時間が180分を超えています。今すぐ休憩を取ってください。
  </div>

  <div class="container">
    <h1 class="app-title">休憩促進アプリ</h1>

    <!-- タイマー表示 -->
    <div class="timer-section">
      <svg id="timer-svg" class="timer-svg" width="200" height="200"
           viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle id="timer-track" cx="100" cy="100" r="88"
                stroke="#e0e0e0" stroke-width="12" fill="none"/>
        <circle id="timer-progress" cx="100" cy="100" r="88"
                stroke="#1976d2" stroke-width="12" fill="none"
                stroke-linecap="round"
                transform="rotate(-90 100 100)"
                stroke-dasharray="552.92" stroke-dashoffset="0"/>
        <text id="timer-label" x="100" y="90"
              text-anchor="middle" dominant-baseline="auto"
              font-size="16" fill="#4caf50"
              font-family="inherit" visibility="hidden">休憩</text>
        <text id="timer-text" x="100" y="116"
              text-anchor="middle" dominant-baseline="auto"
              font-size="38" font-weight="700" fill="#212121"
              font-variant-numeric="tabular-nums" font-family="inherit">--:--</text>
      </svg>
      <div id="session-elapsed" class="session-elapsed">セッション経過: --:--</div>
    </div>

    <!-- 累積バー -->
    <div class="accum-section">
      <div class="accum-label">
        <span>休憩なし連続作業時間</span>
        <span id="accum-text">0分 / 180分</span>
      </div>
      <div class="accum-bar-track">
        <div id="accum-bar" class="accum-bar"></div>
      </div>
      <p class="accum-hint">休憩を取るとリセット。180分超で強制休憩モードに移行。</p>
    </div>

    <!-- 本日の統計 -->
    <div class="stats-section">
      <span>本日の作業: <strong id="stats-work">--</strong></span>
      <span>本日の休憩: <strong id="stats-break">--</strong></span>
    </div>

    <!-- 操作ボタン -->
    <div class="button-group">
      <button id="btn-start" class="btn btn-primary">開始</button>
      <button id="btn-pause" class="btn btn-secondary" style="display:none">停止</button>
      <button id="btn-reset" class="btn btn-secondary" style="display:none">リセット</button>
      <button id="btn-self" class="btn btn-self tooltip-btn" data-tooltip="今の状態を記録して次のアクションを決めます">立ち止まる</button>
      <button id="btn-end" class="btn btn-end">終了</button>
    </div>

    <!-- タイマー間隔変更（非表示中 - 復元するにはこのコメントを外す） -->
    <!--
    <div class="config-section">
      <span class="config-label">タイマー間隔:</span>
      <div id="preset-group" class="preset-group">
        <button class="preset-btn" data-min="15">15分</button>
        <button class="preset-btn" data-min="30">30分</button>
        <button class="preset-btn" data-min="45">45分</button>
        <button class="preset-btn" data-min="60">60分</button>
        <button class="preset-btn" data-min="75">75分</button>
        <button class="preset-btn" data-min="90">90分</button>
      </div>
    </div>
    -->

    <!-- グラフ -->
    <div class="charts-section">
      <div class="chart-box">
        <div class="chart-title-row">
          <h3 class="chart-title">状態スコア推移</h3>
          <div class="period-btn-group">
            <button class="period-btn active" data-period="today">今日</button>
            <button class="period-btn" data-period="yesterday">前日</button>
            <button class="period-btn" data-period="dayBefore">前々日</button>
            <button class="period-btn" data-period="week">直近7日</button>
          </div>
        </div>
        <div class="chart-legend-note">
          作業負荷:
          <span class="legend-chip" style="background:#4A90D9">低(1-2)</span>
          <span class="legend-chip" style="background:#888780">中(3)</span>
          <span class="legend-chip" style="background:#D85A30">高(4-5)</span>
          <span class="legend-vline"></span>休憩
        </div>
        <div class="chart-legend-note">点の大きさ＝作業時間（最大60分）</div>
        <canvas id="state-chart"></canvas>
        <input type="range" id="week-slider" class="week-slider hidden" min="0" max="0" step="1" value="0">
      </div>
    </div>

    <!-- ログ一覧 -->
    <div class="log-section">
      <div class="log-header" id="log-header">
        <h3 class="log-title">最近の記録</h3>
        <div class="log-header-actions">
          <button id="btn-report-small" class="btn-report-small">日報を出力</button>
          <span class="log-chevron" id="log-chevron">▼</span>
        </div>
      </div>
      <div class="log-collapse" id="log-collapse">
        <div id="log-list" class="log-list"></div>
      </div>
    </div>
  </div>

  <!-- ダイアログオーバーレイ -->
  <div id="dialog-overlay" class="dialog-overlay hidden">
    <div id="dialog-box" class="dialog-box">
      <!-- dialog-state-chart は JS が step-content 内に移動して使う -->
      <canvas id="dialog-state-chart" style="display:none"></canvas>
      <div id="step-indicator" class="step-indicator"></div>
      <div id="step-content" class="step-content"></div>
      <div id="advice-banner" class="advice-banner hidden"></div>
      <div class="dialog-nav">
        <button id="btn-back" class="btn btn-secondary" style="visibility:hidden">戻る</button>
        <button id="btn-next" class="btn btn-primary">次へ</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=20260516c"></script>
</body>
</html>
